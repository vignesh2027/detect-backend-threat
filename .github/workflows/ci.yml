name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.58

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            apps/ingest/package-lock.json
            apps/dashboard/package-lock.json

      - name: ESLint — ingest
        working-directory: apps/ingest
        run: npm ci --ignore-scripts && npm run lint || true

      - name: ESLint — dashboard
        working-directory: apps/dashboard
        run: npm ci --ignore-scripts && npm run lint || true

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      redis:
        image: redis:7.2-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Go tests
        run: go test -v -race -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          fail_ci_if_error: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Jest — ingest
        working-directory: apps/ingest
        run: npm ci --ignore-scripts && npm test

      - name: Jest — dashboard
        working-directory: apps/dashboard
        run: npm ci --ignore-scripts && npm test

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build detector image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.detector
          push: false
          tags: detect-backend-threat/detector:ci
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build ingest image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/ingest
          push: false
          tags: detect-backend-threat/ingest:ci
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build dashboard image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/dashboard
          push: false
          tags: detect-backend-threat/dashboard:ci
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  trivy:
    name: Trivy CVE Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy on detector
        uses: aquasecurity/trivy-action@master
        with:
          scan-type:       fs
          scan-ref:        .
          severity:        CRITICAL
          exit-code:       1
          ignore-unfixed:  true
          format:          sarif
          output:          trivy-results.sarif

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  owasp-zap:
    name: OWASP ZAP Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: ZAP Baseline Scan (ingest API)
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target:          "http://localhost:4000"
          fail_action:     false
          allow_issue_writing: false
