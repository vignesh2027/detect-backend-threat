version: "3.9"

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: threat_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-threats}
      POSTGRES_USER: ${POSTGRES_USER:-threats}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-threats} -d ${POSTGRES_DB:-threats}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7.2-alpine
    container_name: threat_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  clamav:
    image: clamav/clamav:stable
    container_name: threat_clamav
    restart: unless-stopped
    volumes:
      - clamav_db:/var/lib/clamav
    ports:
      - "${CLAMAV_PORT:-3310}:3310"
    healthcheck:
      test: ["CMD-SHELL", "clamdcheck.sh 2>/dev/null || clamdscan --ping 3 2>/dev/null"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s

  ingest:
    build:
      context: ./apps/ingest
      dockerfile: Dockerfile
    container_name: threat_ingest
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      PORT: ${INGEST_PORT:-4000}
      REDIS_ADDR: redis:6379
      NODE_ENV: production
    ports:
      - "${INGEST_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  detector:
    build:
      context: .
      dockerfile: Dockerfile.detector
    container_name: threat_detector
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      clamav:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis:6379
      CLAMAV_ADDR: clamav:3310
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:?VIRUSTOTAL_API_KEY is required}
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY:?ABUSEIPDB_API_KEY is required}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_ENDPOINT:-}
    healthcheck:
      test: ["CMD-SHELL", "pgrep detector || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  dashboard:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile
    container_name: threat_dashboard
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis:6379
      NODE_ENV: production
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
    name: threat_postgres_data
  redis_data:
    name: threat_redis_data
  clamav_db:
    name: threat_clamav_db
