run:
  timeout: 5m
  go: "1.22"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
    - revive

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
  goimports:
    local-prefixes: github.com/vignesh2027/detect-backend-threat
  revive:
    rules:
      - name: exported
        arguments:
          - "checkPrivateReceivers"
          - "sayRepetitiveInsteadOfStutters"

issues:
  exclude-rules:
    # Benchmark functions don't need error checks on internal helpers
    - path: _test\.go
      linters: [unparam]
    # Allow _ error ignore in test table-driven setup
    - source: "_ ="
      linters: [errcheck]
  max-issues-per-linter: 0
  max-same-issues: 0
